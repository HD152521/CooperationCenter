<!DOCTYPE html>
<html th:replace="~{fragments/layout/main-layout :: main-layout(~{::head}, ~{::body}, ~{::script})}"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>로그인 - 유학 정보 플랫폼</title>
    <style>
        :where([class^="ri-"])::before {
            content: "\f3c2";
        }

        body {
            background-color: #f9fafb;
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col">
<div class="flex-1 flex flex-col items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <!-- 로그인 → 登录 -->
            <h2 class="mt-6 text-2xl font-bold text-gray-900">登录</h2>
            <!-- 계정에 로그인하고 다양한 유학 정보를 확인하세요 → 登录账户，查看丰富的留学信息 -->
            <p class="mt-2 text-sm text-gray-700">
                登录账户，查看丰富的留学信息
            </p>
        </div>

        <div class="bg-white py-8 px-6 shadow rounded-lg">
            <form class="space-y-6">
                <div>
                    <!-- 이메일 또는 아이디 → 邮箱或账号 -->
                    <label for="email" class="block text-sm font-medium text-gray-700">邮箱或账号</label>
                    <div class="mt-1 relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="ri-user-line text-gray-400"></i>
                        </div>
                        <input id="email" name="email" type="text" autocomplete="email" required
                               class="appearance-none block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-button text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary text-sm"
                               placeholder="请输入邮箱或账号"/>
                    </div>
                </div>

                <div>
                    <div class="flex items-center justify-between">
                        <!-- 비밀번호 → 密码 -->
                        <label for="password" class="block text-sm font-medium text-gray-700">
                            密码
                        </label>
                        <!-- 비밀번호 찾기 → 找回密码 -->
                        <a href="/member/password/forgot" class="text-xs text-primary hover:text-primary-dark">
                            找回密码
                        </a>
                    </div>
                    <div class="mt-1 relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="ri-lock-line text-gray-400"></i>
                        </div>
                        <input id="password" name="password" type="password" autocomplete="current-password" required
                               class="appearance-none block w-full pl-10 pr-10 py-3 border border-gray-300 rounded-button text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary text-sm"
                               placeholder="请输入密码"/>
                        <div class="absolute inset-y-0 right-0 pr-3 flex items-center">
                            <button type="button" id="toggle-password"
                                    class="text-gray-400 hover:text-gray-600 focus:outline-none">
                                <i class="ri-eye-off-line" id="password-icon"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="flex items-center">
                    <input
                            id="remember-me"
                            name="remember-me"
                            type="checkbox"
                            class="hidden"
                    />
                    <!-- (주석 유지) -->
                    <!--                    <label for="remember-me" class="flex items-center cursor-pointer">-->
                    <!--                        <div-->
                    <!--                                class="w-5 h-5 border border-gray-300 rounded flex items-center justify-center mr-2 custom-checkbox"-->
                    <!--                        >-->
                    <!--                            <i class="ri-check-line text-white text-xs hidden"></i>-->
                    <!--                        </div>-->
                    <!--                        <span class="text-sm text-gray-700">로그인 상태 유지</span>-->
                    <!--                    </label>-->
                </div>

                <div>
                    <!-- 로그인 → 登录 -->
                    <button type="submit"
                            class="w-full flex justify-center py-3 px-4 border border-transparent !rounded-button shadow-sm text-sm font-medium text-white bg-primary hover:bg-primary-dark focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary whitespace-nowrap">
                        登录
                    </button>
                </div>
            </form>
        </div>

        <div class="mt-6 text-center">
            <p class="text-sm text-gray-700">
                <!-- 아직 회원이 아니신가요? → 还没有账号吗？ -->
                还没有账号吗？
                <!-- 회원가입 → 注册 -->
                <a href="/member/signup" class="text-indigo-600 hover:text-indigo-800 hover:text-underline">
                    注册
                </a>
            </p>
        </div>
    </div>
</div>

</body>

<th:block th:fragment="script">
    <script type="module">
        const form = document.querySelector("form");

        LeafEvent.addAsyncListener(form, "submit", async (e) => {
            e.preventDefault();

            const email = e.target['email'].value.trim();
            const password = e.target['password'].value.trim();

            const loginDto = {email, password};

            try {
                await api.postJson(`${memberUrl}/login`, loginDto);
                showModal({
                    type: "success",
                    title: "登录成功！",
                    message: "欢迎您，已完成登录。",
                    buttonText: "确认",
                    onClose: () => Turbo.visit("/home")
                });
                return;
            } catch (err) {
                console.error("🚨 네트워크 또는 서버 오류:", err);
            }
        });

        function showModal({type, title, message, buttonText, onClose}) {
            const modal = document.createElement("div");
            modal.className =
                "fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50";

            const iconClass =
                type === "success"
                    ? "ri-checkbox-circle-line text-green-500 bg-green-100"
                    : "ri-close-circle-line text-red-500 bg-red-100";

            modal.innerHTML = `
  <div class="bg-white rounded-lg p-8 max-w-sm w-full mx-4 relative transform transition-all">
    <div class="text-center">
      <div class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 ${iconClass}">
        <i class="ri-${type === "success" ? "checkbox-circle-line" : "close-circle-line"} text-3xl"></i>
      </div>
      <h3 class="text-lg font-medium text-gray-900 mb-2">${title}</h3>
      <p class="text-sm text-gray-500 mb-6">${message}</p>
      <button type="button"
        class="w-full inline-flex justify-center !rounded-button px-4 py-2 text-sm font-medium text-white ${
                type === "success" ? "bg-primary hover:bg-primary-dark" : "bg-red-500 hover:bg-red-600"
            } focus:outline-none whitespace-nowrap">
        ${buttonText}
      </button>
    </div>
  </div>`;

            document.body.appendChild(modal);

            const button = modal.querySelector("button");
            button?.addEventListener("click", () => {
                modal.remove();
                if (onClose) onClose();
            });

            modal?.addEventListener("click", (e) => {
                if (e.target === modal) {
                    modal.remove();
                    if (onClose) onClose();
                }
            });

            modal?.focus();
        }
    </script>
    <script id="password-toggle-script" type="module">
        const togglePassword = document.getElementById("toggle-password");
        const passwordInput = document.getElementById("password");
        const passwordIcon = document.getElementById("password-icon");

        togglePassword?.addEventListener("click", function () {
            const type =
                passwordInput.getAttribute("type") === "password" ? "text" : "password";
            passwordInput.setAttribute("type", type);

            if (type === "password") {
                passwordIcon.classList.remove("ri-eye-line");
                passwordIcon.classList.add("ri-eye-off-line");
            } else {
                passwordIcon.classList.remove("ri-eye-off-line");
                passwordIcon.classList.add("ri-eye-line");
            }
        });
    </script>
</th:block>
</html>
