<!DOCTYPE html>
<html th:replace="~{fragments/layout/main-layout :: main-layout(~{::head}, ~{::body}, ~{::script})}"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <!-- 비밀번호 찾기 - 유학 정보 플랫폼 → 找回密码 - 留学信息平台 -->
    <title>找回密码 - 留学信息平台</title>
</head>

<body class="min-h-screen flex flex-col">
<div class="flex-1 flex flex-col items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <!-- 비밀번호 찾기 → 找回密码 -->
            <h2 class="mt-6 text-2xl font-bold text-gray-900">找回密码</h2>
            <!-- 이메일과 이름을 입력하면 인증 메일을 보내드립니다. → 请输入邮箱和姓名，我们将发送验证邮件。 -->
            <p class="mt-2 text-sm text-gray-600">
                请输入邮箱和姓名，我们将发送验证邮件。
            </p>
        </div>

        <div class="bg-white py-8 px-6 shadow rounded-lg">
            <form id="forgotForm" class="space-y-6">
                <div>
                    <!-- 이메일 → 邮箱 -->
                    <label for="email" class="block text-sm font-medium text-gray-700">邮箱</label>
                    <div class="mt-1 relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="ri-mail-line text-gray-400"></i>
                        </div>
                        <input id="email" name="email" type="email" required
                               class="appearance-none block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-button text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary text-sm"
                               placeholder="请输入您注册时使用的邮箱地址"/>
                    </div>
                </div>

                <div>
                    <!-- 이름 → 姓名 -->
                    <label for="name" class="block text-sm font-medium text-gray-700">姓名</label>
                    <div class="mt-1 relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="ri-user-line text-gray-400"></i>
                        </div>
                        <input id="name" name="name" type="text" required
                               class="appearance-none block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-button text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary text-sm"
                               placeholder="请输入注册时填写的姓名"/>
                    </div>
                </div>

                <div>
                    <!-- 인증 메일 보내기 → 发送验证邮件 -->
                    <button type="submit"
                            class="w-full flex justify-center py-3 px-4 border border-transparent !rounded-button shadow-sm text-sm font-medium text-white bg-primary hover:bg-primary-dark focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary whitespace-nowrap">
                        发送验证邮件
                    </button>
                </div>
            </form>
        </div>

        <div class="mt-6 text-center">
            <!-- 로그인으로 돌아가기 → 返回登录 -->
            <a href="/member/login" class="text-sm text-primary hover:text-primary-dark">
                返回登录
            </a>
        </div>
    </div>
</div>

</body>

<th:block th:fragment="script">
    <script type="module">
        const form = document.getElementById("forgotForm");

        form?.addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = document.getElementById("email").value;
            const name = document.getElementById("name").value;

            const dto = {email: email, name: name};

            try {
                await api.postJson(`${memberUrl}/reset/email`, dto);
                // 화면 문구 번역: 인증 링크 안내
                alert("我们已向您输入的邮箱发送验证链接，请查收邮件。");
                Turbo.visit("/member/login");
            } catch (error) {
                console.error("🚨 서버 오류:", error);
            }
        });
    </script>
</th:block>

</html>
