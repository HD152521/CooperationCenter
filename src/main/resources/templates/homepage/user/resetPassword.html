<!DOCTYPE html>
<html th:replace="~{fragments/layout/main-layout :: main-layout(~{::head}, ~{::body}, ~{::script})}"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <title>重置密码 - 留学信息平台</title>
</head>
<body class="min-h-screen flex flex-col">
<div class="flex-1 flex flex-col items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <a href="/" class="text-3xl font-['Pacifico'] text-primary">logo</a>
            <h2 class="mt-6 text-2xl font-bold text-gray-900">重置密码</h2>
            <p class="mt-2 text-sm text-gray-600">
                请输入新的密码。
            </p>
        </div>

        <div class="bg-white py-8 px-6 shadow rounded-lg">
            <form id="resetForm" class="space-y-6">
                <!-- 토큰은 URL 쿼리 파라미터로 전달 -->
                <input type="hidden" id="token" name="token"/>

                <div>
                    <label for="newPassword" class="block text-sm font-medium text-gray-700">新密码</label>
                    <div class="mt-1 relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="ri-lock-line text-gray-400"></i>
                        </div>
                        <input id="newPassword" name="newPassword" type="password" required
                               class="appearance-none block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-button text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary text-sm"
                               placeholder="请输入新密码"/>
                    </div>
                </div>

                <div>
                    <label for="confirmPassword" class="block text-sm font-medium text-gray-700">确认密码</label>
                    <div class="mt-1 relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="ri-lock-2-line text-gray-400"></i>
                        </div>
                        <input id="confirmPassword" name="confirmPassword" type="password" required
                               class="appearance-none block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-button text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary text-sm"
                               placeholder="请再次输入新密码"/>
                    </div>
                </div>

                <div>
                    <button type="submit"
                            class="w-full flex justify-center py-3 px-4 border border-transparent !rounded-button shadow-sm text-sm font-medium text-white bg-primary hover:bg-primary-dark focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary whitespace-nowrap">
                        修改密码
                    </button>
                </div>
            </form>
        </div>

        <div class="mt-6 text-center">
            <a href="/member/login" class="text-sm text-primary hover:text-primary-dark">返回登录</a>
        </div>
    </div>
</div>
</body>

<th:block th:fragment="script">
    <script type="module">
        // URL 쿼리에서 token 추출
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get("token");
        document.getElementById("token").value = token;

        const form = document.getElementById("resetForm");

        form?.addEventListener("submit", async (e) => {
            e.preventDefault();

            const newPassword = document.getElementById("newPassword").value;
            const confirmPassword = document.getElementById("confirmPassword").value;

            if (newPassword !== confirmPassword) {
                alert("两次输入的密码不一致。");
                return;
            }

            const requestDto = {
                resetToken: token,
                newPassword: newPassword
            };

            try {
                await api.postJson(`${memberUrl}/reset/password`, requestDto);
                alert("密码已成功修改。请重新登录。");
                Turbo.visit("/member/login");
            } catch (error) {
                console.error("🚨 서버 오류:", error);
            }
        });
    </script>
</th:block>
</html>
